<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realizacje - USA DIRECT - Import Aut z USA i Kanady</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { background: '#0a0a0a', }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        #modal-content::-webkit-scrollbar {
            width: 4px;
        }

        #modal-content::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>

<body class="font-sans selection:bg-blue-500 selection:text-white">

    <nav class="fixed w-full z-50 glass-nav transition-all duration-300 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-2xl tracking-tight text-white m-0">USA <span
                            class='text-blue-500 font-bold'>DIRECT</span></a>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html#proces"
                        class="text-sm font-medium text-slate-300 hover:text-white transition-colors">Proces</a>
                    <a href="realizacje.html" class="text-sm font-medium text-white transition-colors">Realizacje</a>
                    <a href="index.html#kontakt"
                        class="px-5 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-500 rounded-full transition-all transform hover:scale-105 shadow-[0_0_15px_rgba(59,130,246,0.4)]">Kontakt</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-24 relative min-h-[80vh]">
        <div class="max-w-[1200px] mx-auto px-4 text-center mb-16">
            <div
                class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-sm font-medium text-blue-400 mb-4">
                Galeria sprowadzonych aut
            </div>
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Nasze Realizacje</h1>
            <p class="text-slate-400 text-lg">Kliknij w auto, aby zobaczyć więcej zdjęć (w tym zdjęcia z licytacji).</p>
        </div>

        <div class="max-w-[1200px] mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"
            id="realizacje-grid">
        </div>
    </section>

    <div id="realizacja-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div id="modal-backdrop"
            class="absolute inset-0 bg-black/95 backdrop-blur-md opacity-0 transition-opacity duration-300"></div>

        <div id="modal-content"
            class="bg-[#111] border border-white/10 rounded-3xl max-w-6xl w-full max-h-[95vh] overflow-y-auto shadow-2xl relative transform scale-95 opacity-0 transition-all duration-300 z-10 flex flex-col lg:flex-row">

            <button id="close-modal"
                class="absolute top-5 right-5 z-50 w-12 h-12 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white backdrop-blur-xl transition-all border border-white/20">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div class="lg:w-3/5 bg-black relative group min-h-[400px] flex items-center justify-center">
                <img id="modal-image" src="" alt=""
                    class="w-full h-full object-contain transition-opacity duration-300">

                <button id="prev-img"
                    class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 p-3 rounded-full hover:bg-blue-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <button id="next-img"
                    class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 p-3 rounded-full hover:bg-blue-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>

                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/60 px-4 py-1.5 rounded-full text-xs font-medium border border-white/10"
                    id="image-counter">
                    1 / 3
                </div>
            </div>

            <div class="lg:w-2/5 p-8 lg:p-12 flex flex-col bg-gradient-to-b from-slate-900 to-black overflow-y-auto">
                <div class="mb-8">
                    <span id="modal-brand" class="text-blue-500 text-sm font-black tracking-[0.2em] uppercase"></span>
                    <h2 id="modal-title" class="text-3xl lg:text-4xl font-bold text-white mt-2 mb-4 leading-tight"></h2>
                    <div class="flex flex-wrap gap-3">
                        <span
                            class="px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-sm text-slate-300">Rocznik:
                            <b id="modal-year" class="text-white"></b></span>
                        <span
                            class="px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-sm text-slate-300">Silnik:
                            <b id="modal-engine" class="text-white"></b></span>
                        <span
                            class="px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-sm text-slate-300">Przebieg:
                            <b id="modal-mileage" class="text-white"></b></span>
                    </div>
                </div>

                <div class="space-y-4 mb-8 bg-blue-600/5 p-6 rounded-2xl border border-blue-500/20">
                    <div class="flex justify-between items-center border-b border-white/5 pb-4">
                        <span class="text-slate-400 text-sm">Koszt całkowity:</span>
                        <span id="modal-usa-price" class="text-white font-bold text-xl"></span>
                    </div>
                    <div class="flex justify-between items-center border-b border-white/5 pb-4">
                        <span class="text-slate-400 text-sm">Cena rynkowa w PL:</span>
                        <span id="modal-pl-price" class="text-slate-400 line-through"></span>
                    </div>
                    <div class="flex justify-between items-center pt-2">
                        <span class="text-white font-bold">Zysk klienta:</span>
                        <span id="modal-saved-price"
                            class="text-green-400 font-black text-2xl drop-shadow-[0_0_10px_rgba(74,222,128,0.3)]"></span>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-white mb-3 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                            <path
                                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" />
                        </svg>
                        Historia sprowadzenia
                    </h3>
                    <p id="modal-desc" class="text-slate-400 text-base leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const realizacje = [
            {
                id: 1, brand: 'Ford', model: 'Mustang GT', year: '2021', engine: '5.0 V8', mileage: '32 000 km',
                images: ['zdjecia/mustang.png', 'zdjecia/mustang_aukcja1.jpg', 'zdjecia/mustang_aukcja2.jpg'],
                usaPrice: '140 000 PLN', plPrice: '200 000 PLN',
                savedPrice: '60 000 PLN',
                desc: 'Kultowy Ford Mustang z mocnym silnikiem V8 o pojemności 5 litrów. Auto zostało zakupione na aukcji Copart z niewielkim uszkodzeniem lewego błotnika i zderzaka. Samochód w pakiecie wyposażenia Premium z aktywnym wydechem.'
            },
            {
                id: 2, brand: 'BMW', model: 'M4 Competition', year: '2022', engine: '3.0 R6', mileage: '15 500 km',
                images: ['zdjecia/bmwm4.png', 'zdjecia/bmw_aukcja1.jpg', 'zdjecia/bmw_aukcja2.jpg'],
                usaPrice: '250 000 PLN', plPrice: '400 000 PLN',
                savedPrice: '150 000 PLN',
                desc: 'Bezwypadkowe BMW M4 sprowadzone z odzysku ubezpieczeniowego. Posiada pełen pakiet carbon na zewnątrz i wewnątrz, fotele kubełkowe z włókna węglowego i światła laserowe.'
            },
            {
                id: 3, brand: 'BMW', model: 'S1000RR', year: '2023', engine: '999 ccm', mileage: '2 100 km',
                images: ['zdjecia/bmws1000.png', 'zdjecia/bmws1000rr2.png', 'zdjecia/bmws1000rr3.png'],
                usaPrice: '65 000 PLN', plPrice: '95 000 PLN',
                savedPrice: '30 000 PLN',
                desc: 'Topowy superbike od BMW. Motocykl sprowadzony z USA z minimalnym przebiegiem. Wyposażony w pakiet M, kute felgi oraz tytanowy układ wydechowy Akrapovič.'
            },
            {
                id: 4, brand: 'Audi', model: 'Q5 Premium 45 TFSI', year: '2025', engine: '2.0 TFSI', mileage: '4 500 km',
                images: ['zdjecia/audiq5.png', 'zdjecia/audiq52.png', 'zdjecia/audiq53.png'],
                usaPrice: '190 000 PLN', plPrice: '260 000 PLN',
                savedPrice: '70 000 PLN',
                desc: 'Nowoczesny SUV Audi Q5 w wersji Premium 45 TFSI z rocznika 2025. Auto sprowadzone z USA z minimalnym przebiegiem, w stanie fabrycznym. Wyposażone w napęd quattro oraz wirtualny kokpit.'
            },
        ];

        let currentImageIndex = 0;
        let currentCarImages = [];

        const gridContainer = document.getElementById('realizacje-grid');
        const modal = document.getElementById('realizacja-modal');
        const modalImg = document.getElementById('modal-image');
        const counter = document.getElementById('image-counter');

        // Generowanie kart
        realizacje.forEach(item => {
            const card = document.createElement('div');
            card.className = 'group bg-[#111] border border-white/5 rounded-3xl overflow-hidden cursor-pointer hover:border-blue-500/50 transition-all duration-500 transform hover:-translate-y-2 shadow-2xl flex flex-col';
            card.innerHTML = `
                <div class="relative aspect-[16/10] overflow-hidden">
                    <img src="${item.images[0]}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                    <div class="absolute bottom-4 left-4">
                         <span class="bg-green-500 text-white text-[10px] font-black px-3 py-1 rounded-full">ZYSK: ${item.savedPrice}</span>
                    </div>
                </div>
                <div class="p-6 flex flex-col flex-grow">
                    <span class="text-blue-500 text-[10px] font-bold tracking-widest uppercase">${item.brand}</span>
                    <h3 class="text-white font-bold text-xl mb-4">${item.model}</h3>
                    
                    <div class="flex justify-between text-slate-500 text-xs border-t border-white/5 pt-4 mb-6">
                        <span>${item.year}</span>
                        <span>${item.mileage}</span>
                        <span>${item.engine}</span>
                    </div>

                    <div class="mt-auto">
                        <div class="w-full py-3 px-4 rounded-xl bg-white/5 border border-white/10 text-white text-sm font-medium flex items-center justify-center gap-2 group-hover:bg-blue-600 group-hover:border-blue-500 transition-all duration-300">
                            Szczegóły realizacji
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                        </div>
                    </div>
                </div>`;
            card.onclick = () => openModal(item);
            gridContainer.appendChild(card);
        });

        function openModal(item) {
            currentCarImages = item.images;
            currentImageIndex = 0;
            updateModalImage();

            document.getElementById('modal-brand').textContent = item.brand;
            document.getElementById('modal-title').textContent = item.model;
            document.getElementById('modal-year').textContent = item.year;
            document.getElementById('modal-engine').textContent = item.engine;
            document.getElementById('modal-mileage').textContent = item.mileage;
            document.getElementById('modal-usa-price').textContent = item.usaPrice;
            document.getElementById('modal-pl-price').textContent = item.plPrice;
            document.getElementById('modal-saved-price').textContent = item.savedPrice;
            document.getElementById('modal-desc').textContent = item.desc;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            setTimeout(() => {
                document.getElementById('modal-backdrop').classList.add('opacity-100');
                document.getElementById('modal-content').classList.add('opacity-100', 'scale-100');
            }, 10);
        }

        function updateModalImage() {
            modalImg.style.opacity = '0';
            setTimeout(() => {
                modalImg.src = currentCarImages[currentImageIndex];
                modalImg.style.opacity = '1';
                counter.textContent = `${currentImageIndex + 1} / ${currentCarImages.length}`;
            }, 150);
        }

        document.getElementById('next-img').onclick = (e) => {
            e.stopPropagation();
            currentImageIndex = (currentImageIndex + 1) % currentCarImages.length;
            updateModalImage();
        };

        document.getElementById('prev-img').onclick = (e) => {
            e.stopPropagation();
            currentImageIndex = (currentImageIndex - 1 + currentCarImages.length) % currentCarImages.length;
            updateModalImage();
        };

        const closeModal = () => {
            document.getElementById('modal-backdrop').classList.remove('opacity-100');
            document.getElementById('modal-content').classList.remove('opacity-100', 'scale-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = '';
            }, 300);
        };

        document.getElementById('close-modal').onclick = closeModal;
        document.getElementById('modal-backdrop').onclick = closeModal;
    </script>
</body>

</html>
